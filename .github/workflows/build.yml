name: Full DevOps Pipeline

env:   # 👈 ADD HERE (TOP LEVEL)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    env:
      DOCKER_USER: surya8442
      IMAGE_NAME: sliding-block-puzzle-game
      IMAGE_TAG: v1

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup NodeJS
      uses: actions/setup-node@v5
      with:
        node-version: 18

    - name: Install Dependencies
      run: npm install

    - name: Build Application
      run: npm run build

    - name: SonarQube Scan
      run: |
        npm install -g sonar-scanner
        sonar-scanner \
          -Dsonar.projectKey=puzzlegame \
          -Dsonar.sources=src \
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}

    - name: Build Docker Image
      run: docker build -t $DOCKER_USER/$IMAGE_NAME:$IMAGE_TAG .

    - name: Docker Login
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Push Docker Image
      run: docker push $DOCKER_USER/$IMAGE_NAME:$IMAGE_TAG

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: ap-south-1

    - name: Deploy to Kubernetes
      run: |
        aws eks update-kubeconfig --region ap-south-1 --name mycluster
        kubectl apply -f deployment.yml
        kubectl apply -f service.yml
